# Render Blueprint for the IMS backend API.
# In Render: New + → Blueprint → connect this repo → it reads this file.
# You'll be prompted for the two `sync: false` secrets (DATABASE_URL, CORS_ORIGIN).
services:
  - type: web
    name: ims-backend
    runtime: node
    plan: free
    region: oregon
    branch: main
    # --include=dev forces Prisma/TS tooling to install even with NODE_ENV=production.
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    # Apply migrations on every deploy, then start the compiled server.
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret for you
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false # paste your Neon connection string (with ?sslmode=require)
      - key: CORS_ORIGIN
        sync: false # set to your Vercel URL, e.g. https://your-app.vercel.app
